<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Scanning Station</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background: #f5f5f5; }
    video { width: 100%; max-width: 400px; border-radius: 8px; background: #000; }
    #status { color: #555; font-size: 16px; margin-top: 10px; }
    #debug { color: #999; font-size: 12px; margin-top: 10px; text-align: left; max-width: 400px; margin-left: auto; margin-right: auto; white-space: pre-wrap; }
    #result { margin-top: 20px; font-size: 18px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Attendance Scanning Station</h2>
  <p>Point the camera at a QR code.</p>
  <button onclick="openForgotQR()" style="margin-top:10px;padding:10px 20px;background:#f57c00;color:white;border:none;border-radius:6px;font-size:16px;">Forgot QR? Tap Here</button>
  <video id="preview" playsinline autoplay muted></video>
  <p id="status">Starting camera...</p>
  <div id="result"></div>
  <div id="debug"></div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyq5gDPXTRFZALsZikg9debZ4m72L8XIo9-Zplkek9UBP2uMKNisqtN1VaRRXna9_E/exec';
    const STATION_KEY = 'Station2026Secure';
    const ROSTER = [
  {
    "id": "INH001",
    "name": "Alvin Contacto",
    "photo": "https://lh3.googleusercontent.com/d/1qsVD3Zd9AVSqp_WjyFuzSIs1DY5N9rfL"
  },
  {
    "id": "INH002",
    "name": "Romeo Villanueva",
    "photo": "https://lh3.googleusercontent.com/d/1fq_xFgxnR7WN-ycAVEp3PQDAbHSK2RyB"
  },
  {
    "id": "INH003",
    "name": "Melvin Collantes",
    "photo": "https://lh3.googleusercontent.com/d/1FnsVhs30ibfyRpnRwi5EifHdlldEEXHa"
  },
  {
    "id": "INH004",
    "name": "Alvin Landazeras Beta",
    "photo": ""
  },
  {
    "id": "INH005",
    "name": "Rey Catorce",
    "photo": ""
  }
];

    const video = document.getElementById('preview');
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');
    const debugEl = document.getElementById('debug');
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let scanning = true;
    let frameCount = 0;

    debugEl.textContent = 'jsQR loaded: ' + (typeof jsQR !== 'undefined');

    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(stream => {
        video.srcObject = stream;
        video.onloadedmetadata = () => {
          video.play();
          statusEl.textContent = 'Camera ready — scanning...';
          debugEl.textContent += '\nVideo size: ' + video.videoWidth + 'x' + video.videoHeight;
          requestAnimationFrame(tick);
        };
      })
      .catch(err => {
        statusEl.textContent = 'Camera error: ' + err.message;
      });

    function tick() {
      if (!scanning) {
        requestAnimationFrame(tick);
        return;
      }
      if (video.readyState === video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, {
          inversionAttempts: 'attemptBoth'
        });
        frameCount++;
        if (frameCount % 30 === 0) {
          debugEl.textContent = 'jsQR loaded: true\nVideo: ' + video.videoWidth + 'x' + video.videoHeight + '\nFrames checked: ' + frameCount + '\nLast result: ' + (code ? code.data : 'none');
        }
        if (code && code.data) {
          scanning = false;
          statusEl.textContent = 'QR detected: ' + code.data;
          processScan(code.data);
        }
      } else {
        debugEl.textContent = 'Waiting for video... readyState=' + video.readyState + ' width=' + video.videoWidth;
      }
      requestAnimationFrame(tick);
    }

    function processScan(qrText) {
      let id, name, photo;
      try {
        const url = new URL(qrText);
        id = url.searchParams.get('id');
        name = url.searchParams.get('name');
        photo = url.searchParams.get('photo');
      } catch (e) {
        id = qrText.trim();
      }

      if (!id) {
        resultEl.innerHTML = '<span style="color:red;">Could not read ID from QR: ' + qrText + '</span>';
        setTimeout(resetScanner, 4000);
        return;
      }

      const photoHtml = photo
        ? '<img src="' + photo + '" style="width:120px;height:120px;object-fit:cover;border-radius:50%;border:4px solid #2e7d32;margin-bottom:10px;" />'
        : '';

      resultEl.innerHTML =
        '<div>' + photoHtml + '</div>' +
        '<div style="font-size:20px;color:#2e7d32;">' + (name || id) + '</div>' +
        '<div style="font-size:14px;color:#777;">Processing scan...</div>';

      const finalUrl = WEB_APP_URL + '?id=' + encodeURIComponent(id) + '&key=' + encodeURIComponent(STATION_KEY);

      fetch(finalUrl, { mode: 'no-cors' })
        .then(() => {
          resultEl.innerHTML =
            '<div>' + photoHtml + '</div>' +
            '<div style="font-size:20px;color:#2e7d32;">' + (name || id) + '</div>' +
            '<div style="font-size:14px;">Scan submitted — check Log sheet to confirm Time In/Out.</div>';
        })
        .catch(err => {
          resultEl.innerHTML = '<span style="color:red;">Error submitting scan: ' + err.message + '</span>';
        })
        .finally(() => {
          setTimeout(resetScanner, 4000);
        });
    }

    function resetScanner() {
      resultEl.innerHTML = '';
      statusEl.textContent = 'Camera ready — scanning...';
      scanning = true;

      // Safety check: if video has stopped delivering frames, restart the stream
      if (!video.srcObject || video.readyState < 2) {
        statusEl.textContent = 'Restarting camera...';
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
          .then(stream => {
            video.srcObject = stream;
            video.play();
            statusEl.textContent = 'Camera ready — scanning...';
          })
          .catch(err => {
            statusEl.textContent = 'Camera error: ' + err.message;
          });
      }
    }
    let selectedEmployeeId = null;

    function openForgotQR() {
      document.getElementById('forgotModal').style.display = 'block';
      document.getElementById('manualStatusStep').style.display = 'none';
      renderEmployeeList(ROSTER);
      document.getElementById('employeeSearch').value = '';
    }

    function closeForgotQR() {
      document.getElementById('forgotModal').style.display = 'none';
      selectedEmployeeId = null;
    }

    function renderEmployeeList(list) {
      const container = document.getElementById('employeeList');
      container.innerHTML = list.map(emp =>
        '<div onclick="selectEmployee(\'' + emp.id + '\', \'' + emp.name.replace(/'/g, "\\'") + '\')" style="display:flex;align-items:center;padding:8px;border-bottom:1px solid #eee;cursor:pointer;">' +
        (emp.photo ? '<img src="' + emp.photo + '" style="width:40px;height:40px;border-radius:50%;object-fit:cover;margin-right:10px;">' : '') +
        '<span>' + emp.name + ' (' + emp.id + ')</span></div>'
      ).join('');
    }

    document.getElementById('employeeSearch').addEventListener('input', function() {
      const q = this.value.toLowerCase();
      renderEmployeeList(ROSTER.filter(e => e.name.toLowerCase().includes(q) || e.id.toLowerCase().includes(q)));
    });

    function selectEmployee(id, name) {
      selectedEmployeeId = id;
      document.getElementById('selectedEmployeeName').textContent = name + ' (' + id + ')';
      document.getElementById('manualStatusStep').style.display = 'block';
    }

    function submitManual(status) {
      if (!selectedEmployeeId) return;
      const url = WEB_APP_URL + '?mode=manual&id=' + encodeURIComponent(selectedEmployeeId) + '&status=' + encodeURIComponent(status) + '&key=' + encodeURIComponent(STATION_KEY);
      fetch(url, { mode: 'no-cors' }).finally(() => {
        resultEl.innerHTML = '<div style="font-size:20px;color:#f57c00;">' + status + ' (Manual) submitted for ' + selectedEmployeeId + '</div>';
        closeForgotQR();
        setTimeout(resetScanner, 4000);
      });
    }
  </script>
  <div id="forgotModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:999;overflow-y:auto;">
     <div style="background:white;max-width:500px;margin:30px auto;padding:20px;border-radius:8px;">
       <h3>Select Employee</h3>
       <input type="text" id="employeeSearch" placeholder="Search name..." style="width:100%;padding:8px;margin-bottom:10px;box-sizing:border-box;">
       <div id="employeeList" style="max-height:300px;overflow-y:auto;"></div>
       <div id="manualStatusStep" style="display:none;margin-top:15px;">
         <p id="selectedEmployeeName" style="font-weight:bold;"></p>
         <button onclick="submitManual('Time In')" style="padding:12px 20px;background:#2e7d32;color:white;border:none;border-radius:6px;margin-right:10px;">Time In</button>
         <button onclick="submitManual('Time Out')" style="padding:12px 20px;background:#1565c0;color:white;border:none;border-radius:6px;">Time Out</button>
       </div>
       <button onclick="closeForgotQR()" style="margin-top:15px;padding:8px 16px;background:#999;color:white;border:none;border-radius:6px;">Cancel</button>
     </div>
   </div>
</body>
</html>
